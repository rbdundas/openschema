<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Open Schema Foundation</title>
  <meta name="description" content="Sign in to your Open Schema Foundation account to manage data schemas and BPMN workflow definitions.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
  
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body class="login-page-body">
  <div class="login-card-container">
    <div class="login-glow-backdrop" aria-hidden="true"></div>
    
    <main class="login-card">
      <div class="login-header">
        <a href="/" class="login-brand" id="brand-link">
          OpenSchema<span class="logo-accent">.foundation</span>
        </a>
        <p class="login-subtitle" id="subtitle-text">Sign in to access the schema portal.</p>
      </div>

      <div class="login-tabs" role="tablist" style="justify-content: center;">
        <button type="button" class="login-tab-btn is-active" id="tab-login" role="tab" aria-selected="true" aria-controls="auth-form" style="flex: 1; text-align: center;">Log in</button>
      </div>

      <form class="login-form" id="auth-form" novalidate>
        <div class="form-group">
          <label for="username">Email Address</label>
          <input 
            type="email" 
            id="username" 
            name="username" 
            class="form-input" 
            autocomplete="email" 
            required 
            placeholder="e.g. admin@openschema.foundation"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            autocomplete="current-password" 
            required 
            minlength="8"
            placeholder="••••••••"
          >
        </div>

        <button type="submit" class="btn-submit" id="submit-button" style="margin-top: 1rem;">Log in</button>
      </form>

      <div class="login-message" id="message-box" role="status" aria-live="polite"></div>

      <a href="/" class="back-to-home">← Back to landing page</a>
    </main>
  </div>

  <script>
    'use strict';
    (function () {
      var submitButton = document.getElementById('submit-button');
      var form = document.getElementById('auth-form');
      var usernameInput = document.getElementById('username');
      var passwordInput = document.getElementById('password');
      var messageBox = document.getElementById('message-box');

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = 'login-message is-' + type;
        messageBox.style.display = 'block';
      }

      function hideMessage() {
        messageBox.style.display = 'none';
        messageBox.className = 'login-message';
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        hideMessage();

        var username = usernameInput.value.trim();
        var password = passwordInput.value;

        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(username)) {
          showMessage('Please enter a valid email address.', 'error');
          return;
        }

        if (password.length < 8) {
          showMessage('Password must be at least 8 characters.', 'error');
          return;
        }

        submitButton.disabled = true;
        showMessage('Working…', 'info');

        fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username: username, password: password })
        })
        .then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) {
              throw new Error(data.error || 'Invalid credentials.');
            }
            return data;
          });
        })
        .then(function (data) {
          showMessage('Authenticated. Loading Schema portal...', 'success');
          window.location.assign('/schema.html');
        })
        .catch(function (error) {
          showMessage(error.message || 'Something went wrong.', 'error');
        })
        .finally(function () {
          submitButton.disabled = false;
        });
      });

      // Quick auto-redirect to schema portal if already logged in
      fetch('/api/me')
        .then(function (res) {
          if (res.ok) {
            window.location.assign('/schema.html');
          }
        })
        .catch(function () {});

    })();
  </script>
</body>

</html>
