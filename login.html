<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Open Schema Foundation</title>
  <meta name="description" content="Sign in to your Open Schema Foundation account to manage data schemas and BPMN workflow definitions.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
  
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body class="login-page-body">
  <div class="login-card-container">
    <div class="login-glow-backdrop" aria-hidden="true"></div>
    
    <main class="login-card">
      <div class="login-header">
        <a href="/" class="login-brand" id="brand-link">
          OpenSchema<span class="logo-accent">.foundation</span>
        </a>
        <p class="login-subtitle" id="subtitle-text">Sign in to access the schema portal.</p>
      </div>

      <div class="login-tabs" role="tablist">
        <button type="button" class="login-tab-btn is-active" id="tab-login" role="tab" aria-selected="true" aria-controls="auth-form">Log in</button>
        <button type="button" class="login-tab-btn" id="tab-register" role="tab" aria-selected="false" aria-controls="auth-form">Register</button>
      </div>

      <form class="login-form" id="auth-form" novalidate>
        <div class="form-group">
          <label htmlFor="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            autocomplete="username" 
            required 
            minlength="3"
            placeholder="e.g. administrator"
          >
        </div>

        <div class="form-group">
          <label htmlFor="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            autocomplete="current-password" 
            required 
            minlength="8"
            placeholder="••••••••"
          >
        </div>

        <button type="submit" class="btn-submit" id="submit-button">Log in</button>
      </form>

      <div class="login-message" id="message-box" role="status" aria-live="polite"></div>

      <a href="/" class="back-to-home">← Back to landing page</a>
    </main>
  </div>

  <script>
    'use strict';
    (function () {
      var tabLogin = document.getElementById('tab-login');
      var tabRegister = document.getElementById('tab-register');
      var submitButton = document.getElementById('submit-button');
      var subtitleText = document.getElementById('subtitle-text');
      var form = document.getElementById('auth-form');
      var usernameInput = document.getElementById('username');
      var passwordInput = document.getElementById('password');
      var messageBox = document.getElementById('message-box');

      var currentMode = 'login'; // 'login' | 'register'

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = 'login-message is-' + type;
      }

      function hideMessage() {
        messageBox.style.display = 'none';
        messageBox.className = 'login-message';
      }

      function setMode(mode) {
        currentMode = mode;
        hideMessage();
        if (mode === 'login') {
          tabLogin.classList.add('is-active');
          tabLogin.setAttribute('aria-selected', 'true');
          tabRegister.classList.remove('is-active');
          tabRegister.setAttribute('aria-selected', 'false');
          submitButton.textContent = 'Log in';
          subtitleText.textContent = 'Sign in to access the schema portal.';
          passwordInput.setAttribute('autocomplete', 'current-password');
        } else {
          tabRegister.classList.add('is-active');
          tabRegister.setAttribute('aria-selected', 'true');
          tabLogin.classList.remove('is-active');
          tabLogin.setAttribute('aria-selected', 'false');
          submitButton.textContent = 'Create account';
          subtitleText.textContent = 'Create an account to start building schemas.';
          passwordInput.setAttribute('autocomplete', 'new-password');
        }
      }

      tabLogin.addEventListener('click', function () {
        setMode('login');
      });

      tabRegister.addEventListener('click', function () {
        setMode('register');
      });

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        hideMessage();

        var username = usernameInput.value.trim();
        var password = passwordInput.value;

        if (username.length < 3 || password.length < 8) {
          showMessage('Username must be 3+ characters and password 8+ characters.', 'error');
          return;
        }

        submitButton.disabled = true;
        showMessage('Working…', 'info');

        var endpoint = currentMode === 'register' ? '/api/register' : '/api/login';

        fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username: username, password: password })
        })
        .then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) {
              throw new Error(data.error || 'Server request failed.');
            }
            return data;
          });
        })
        .then(function (data) {
          if (currentMode === 'register') {
            showMessage('Account created successfully. You can now log in.', 'success');
            usernameInput.value = '';
            passwordInput.value = '';
            setMode('login');
          } else {
            showMessage('Authenticated. Loading Schema portal...', 'success');
            window.location.assign('/schema.html');
          }
        })
        .catch(function (error) {
          showMessage(error.message || 'Something went wrong.', 'error');
        })
        .finally(function () {
          submitButton.disabled = false;
        });
      });

      // Quick auto-redirect to schema portal if already logged in
      fetch('/api/me')
        .then(function (res) {
          if (res.ok) {
            window.location.assign('/schema.html');
          }
        })
        .catch(function () {});

    })();
  </script>
</body>

</html>
