name: Deploy to Google Cloud Run

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  PROJECT_ID: openschema-foundation
  SERVICE_NAME: openschema
  REGION: us-central1

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Webpack compiles
        run: npm run build

      # Authenticate to Google Cloud using service account JSON credentials
      # Set up repository secret GCP_SA_KEY containing the JSON key
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Build the Docker container using Google Cloud Build and deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./
          flags: '--allow-unauthenticated'
